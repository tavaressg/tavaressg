  <div id="root"></div>
</div>

<script src="app.js?v=96"></script>
<script>/* SW removido — desregistra instalações antigas e limpa cache p/ destravar o versionamento ?v=N */
if('serviceWorker' in navigator){ navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())); }
if(window.caches){ caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))); }</script>
</body>
